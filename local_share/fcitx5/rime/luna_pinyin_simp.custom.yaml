patch:
  ascii_punct: false
  ascii_composer:
    switch_key:
      Shift_L: commit_code
      Shift_R: commit_code
  "punctuator/half_shape":
    "`": "‶"
    "~": "～"
    "!": "！"
    "@": "@"
    "#": "#"
    "$": "￥"
    "%": "％"
    "^": "……"
    "&": "&"
    "*": "＊"
    "(": "（"
    ")": "）"
    "-": "-"
    "_": "——"
    "=": "="
    "+": "+"
    "[": "【"
    "]": "】"
    "{": ["｛", "『", "〖", "「", "〔", "［", "〚", "〘"]
    "}": ["｝", "』", "〗", "」", "〕", "］", "〛", "〙"]
    "\\": "、"
    "|": "｜"
    "<": "《"
    ">": "》"
    "/": "/"
